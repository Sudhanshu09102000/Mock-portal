<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Mock Portal</title>

  <!-- Bootstrap + Fonts -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

  <style>

    :root {
      --grad1: #00c6ff;
      --grad2: #0072ff;
      --grad3: #6dd3ff;
      --grad4: #7b61ff;
      --accent: #0d6efd;
      --muted: #6c757d;
    }

    /* Global body styling for both portal + test */
    body {
      font-family: 'Poppins', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(120deg, #0a0f24, #1a2740);
      color: #111827;
      /* DARK TEXT for light mode */
      margin: 0;
      padding: 0;
      min-height: 100vh;
      overflow-x: hidden;
      animation: fadeIn 0.8s ease;
    }

    @keyframes fadeIn {
      0% {
        opacity: 0;
        transform: scale(0.98);
      }

      100% {
        opacity: 1;
        transform: scale(1);
      }
    }

    /* ---------- PORTAL STYLES ---------- */

    .card-main {
      width: 95%;
      max-width: 950px;
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 30px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
      text-align: center;
      animation: fadeIn 0.6s ease;
      margin: 40px auto;
    }

    h1 {
      font-weight: 700;
      margin-bottom: 25px;
      color: #e4f3ff;
      text-shadow: 0 0 8px rgba(0, 194, 255, 0.4);
    }

    h2 {
      color: #d8ebff;
      margin-bottom: 20px;
      font-weight: 600;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 15px;
    }

    .btn-glass {
      border: none;
      border-radius: 12px;
      padding: 16px;
      color: #fff;
      font-weight: 600;
      letter-spacing: 0.3px;
      background: linear-gradient(135deg, var(--grad1), var(--grad2));
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
      transition: all 0.3s;
      cursor: pointer;
      position: relative;
      overflow: hidden;
    }

    .btn-glass:hover {
      transform: translateY(-6px) scale(1.05);
      box-shadow: 0 0 25px rgba(0, 194, 255, 0.7);
    }

    .btn-glass::after {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(255, 255, 255, 0.15) 0%, transparent 60%);
      transform: translateX(-50%) translateY(-50%);
      transition: opacity 0.4s;
      opacity: 0;
    }

    .btn-glass:hover::after {
      opacity: 1;
    }

    .back-btn {
      border: none;
      background: linear-gradient(135deg, #ff6b6b, #d41b1b);
      border-radius: 10px;
      color: #fff;
      font-weight: 600;
      padding: 10px 18px;
      margin-bottom: 20px;
      transition: all 0.3s;
    }

    .back-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 18px rgba(255, 0, 0, 0.4);
    }

    .hidden {
      display: none !important;
    }

    /* Background Canvas */
    #bgCanvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
    }

    @keyframes fadeOut {
      from {
        opacity: 1;
        transform: translateY(0);
      }

      to {
        opacity: 0;
        transform: translateY(15px);
      }
    }

    /* Responsive */
    @media (max-width: 600px) {
      .card-main {
        padding: 20px;
      }

      h1,
      h2 {
        font-size: 1.4rem;
      }

      .btn-glass {
        padding: 12px;
        font-size: 0.9rem;
      }
    }

    /* ---------- TEST ENGINE STYLES ---------- */

    #question-container {
      font-size: 1.2rem;
      font-weight: 500;
    }

    .option {
      margin-bottom: 10px;
    }

    .explanation-card {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: 15px;
      margin-bottom: 10px;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
    }

    #helpContent a.btn {
      background: linear-gradient(90deg, #0d6efd, #6f42c1);
      color: #fff;
      transition: all 0.3s ease;
    }

    #helpContent a.btn:hover {
      transform: scale(1.05);
      background: linear-gradient(90deg, #6f42c1, #0d6efd);
    }

    #helpContent img {
      transition: transform 0.3s ease;
    }

    #helpContent img:hover {
      transform: scale(1.05);
    }

    /* Text colors in modals/helps (LIGHT MODE) */
    #helpContent,
    #explanationContent,
    #scoreContent {
      color: #111827;
    }

    .card-app {
      border-radius: 16px;
      box-shadow: 0 8px 28px rgba(13, 110, 253, 0.06);
      backdrop-filter: blur(20px);
      background: rgba(255, 255, 255, 0.25) !important;
      border: 1px solid rgba(255, 255, 255, 0.35);
      box-shadow: 0 12px 42px rgba(0, 0, 0, 0.10);
      animation: fadeIn 1s ease;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .question-box {
      padding: 22px;
      background: #fff !important;
      border-radius: 15px !important;
      border: 1px solid #e6e6e6 !important;
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.08);
      min-height: 260px;
      height: 100%;
      max-height: none;
      overflow: visible;
      transition: transform 0.15s ease;
      /* for light swipe nudge */
    }

    .question-text {
      font-size: 1.05rem;
      color: #111827;
    }

    .options {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 14px
    }

    .option-label {
      flex: 1 1 48%;
      min-height: 64px;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #e6eef9;
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      background: #fbfdff;
      font-weight: 600;
      transition: all 0.3s ease;
      color: #111827;
    }

    .option-label:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 22px rgba(13, 110, 253, 0.25);
      border-color: #0d6efd;
    }

    .option-label .badge-pos {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-weight: 700
    }

    .option-label.selected {
      background: linear-gradient(90deg, #e6f6ff, #f1fbff);
      border-color: var(--accent);
      position: relative;
      overflow: hidden;
    }

    .option-label.selected::after {
      content: "";
      position: absolute;
      top: -120%;
      left: -100%;
      width: 300%;
      height: 300%;
      background: radial-gradient(circle, rgba(255, 255, 255, 0.5), transparent 60%);
      animation: shineEffect 0.9s ease-out;
    }

    @keyframes shineEffect {
      0% {
        transform: translate(-50%, -50%);
        opacity: 0.7;
      }

      100% {
        transform: translate(60%, 60%);
        opacity: 0;
      }
    }

    .option-label.correct {
      outline: 3px solid rgba(40, 167, 69, 0.12);
      border-color: #28a745 !important;
      background: linear-gradient(90deg, rgba(40, 167, 69, 0.12), rgba(40, 167, 69, 0.04));
      box-shadow: 0 6px 20px rgba(40, 167, 69, 0.08);
      transform: translateY(-2px);
      animation: pulseGood 900ms ease-out;
    }

    .option-label.wrong {
      outline: 3px solid rgba(220, 53, 69, 0.08);
      border-color: #dc3545 !important;
      background: linear-gradient(90deg, rgba(220, 53, 69, 0.08), rgba(220, 53, 69, 0.03));
      box-shadow: 0 6px 20px rgba(220, 53, 69, 0.06);
      transform: translateY(-2px);
      animation: pulseBad 900ms ease-out;
    }

    .option-label.correct .badge-pos {
      background: #28a745;
      color: #fff;
    }

    .option-label.wrong .badge-pos {
      background: #dc3545;
      color: #fff;
    }

    @keyframes pulseGood {
      0% {
        box-shadow: 0 0 0 0 rgba(40, 167, 69, 0.18);
      }

      70% {
        box-shadow: 0 0 0 14px rgba(40, 167, 69, 0);
      }

      100% {
        box-shadow: 0 0 0 0 rgba(40, 167, 69, 0);
      }
    }

    @keyframes pulseBad {
      0% {
        box-shadow: 0 0 0 0 rgba(220, 53, 69, 0.18);
      }

      70% {
        box-shadow: 0 0 0 14px rgba(220, 53, 69, 0);
      }

      100% {
        box-shadow: 0 0 0 0 rgba(220, 53, 69, 0);
      }
    }

    .question-nav {
      gap: 8px;
      margin-top: 18px
    }

    .qbtn {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      transition: 0.3s ease;
    }

    .qbtn.default {
      background: #f8f9fb;
      border: 1px solid #e6eef9
    }

    .qbtn.answered {
      background: #28a745;
      color: #fff
    }

    .qbtn.not-answered {
      background: #dc3545;
      color: #fff
    }

    .qbtn.review {
      background: #ffc107;
      color: #212529
    }

    .qbtn.review-answered {
      background: linear-gradient(90deg, #ffc107 50%, #28a745 50%);
      color: #212529
    }

    .qbtn.current {
      box-shadow: 0 6px 18px rgba(13, 110, 253, 0.12);
      border: 2px solid rgba(13, 110, 253, 0.12)
    }

    .qbtn:hover {
      transform: scale(1.18);
      box-shadow: 0 0 12px rgba(0, 255, 200, 0.6);
    }

    #timer {
      position: fixed;
      right: 18px;
      bottom: 18px;
      background: #0d6efd;
      color: #fff;
      padding: 10px 14px;
      border-radius: 12px;
      font-weight: 700;
      z-index: 1100
    }

    .controls {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 14px
    }

    .progress-wrap {
      height: 10px;
      border-radius: 20px;
      background: #e9f2ff;
      overflow: hidden
    }

    .progress-inner {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), #6f42c1)
    }

    #review-container .card {
      border-radius: 12px
    }

    @media (max-width:680px) {
      .option-label {
        flex-basis: 100%
      }

      .qbtn {
        width: 40px;
        height: 40px
      }
    }

    /* overlay blink on body */
    body.blink-green::before,
    body.blink-red::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 2000;
      opacity: 0;
    }

    body.blink-green::before {
      background: linear-gradient(180deg, rgba(40, 167, 69, 0.14), rgba(40, 167, 69, 0.08));
      animation: blinkGreen 900ms ease-out;
    }

    body.blink-red::before {
      background: linear-gradient(180deg, rgba(220, 53, 69, 0.14), rgba(220, 53, 69, 0.08));
      animation: blinkRed 900ms ease-out;
    }

    @keyframes blinkGreen {
      0% {
        opacity: 0;
        transform: scale(1);
      }

      10% {
        opacity: 1;
        transform: scale(1.01);
      }

      70% {
        opacity: 0.35;
        transform: scale(1);
      }

      100% {
        opacity: 0;
        transform: scale(1);
      }
    }

    @keyframes blinkRed {
      0% {
        opacity: 0;
        transform: scale(1);
      }

      10% {
        opacity: 1;
        transform: scale(1.01);
      }

      70% {
        opacity: 0.35;
        transform: scale(1);
      }

      100% {
        opacity: 0;
        transform: scale(1);
      }
    }

    .options.disabled .option-label {
      pointer-events: none;
      opacity: 0.94;
    }

    body.darkmode {
      background: #000 !important;
      color: #f8f9fa !important;
    }

    body.darkmode .question-box,
    body.darkmode .card,
    body.darkmode .card-app {
      background: #181818 !important;
      border-color: #282828 !important;
      color: #f8f9fa !important;
      box-shadow: 0 8px 28px rgba(0, 0, 0, 0.3) !important;
    }

    body.darkmode .option-label {
      background: #232323 !important;
      color: #f8f9fa !important;
      border-color: #323232 !important;
    }

    body.darkmode .option-label.selected {
      background: #222233 !important;
    }

    body.darkmode .btn,
    body.darkmode .btn:focus {
      background: #222 !important;
      color: #f8f9fa !important;
      border-color: #444 !important;
    }

    body.darkmode #helpModal .modal-content,
    body.darkmode #scoreModal .modal-content,
    body.darkmode #explanationModal .modal-content {
      background-color: #181818 !important;
      color: #f8f9fa !important;
      border-color: #282828 !important;
      box-shadow: 0 8px 28px rgba(0, 0, 0, 0.6) !important;
    }

    body.darkmode #helpModal .modal-body,
    body.darkmode #scoreModal .modal-body,
    body.darkmode #explanationModal .modal-body {
      background-color: #181818 !important;
      color: #f8f9fa !important;
    }

    /* DARK MODE: ensure texts visible inside content areas */
    body.darkmode #helpContent,
    body.darkmode #explanationContent,
    body.darkmode #scoreContent {
      color: #f8f9fa !important;
    }

    body.darkmode .question-text {
      color: #f8f9fa !important;
    }

    body.darkmode .card .card-body,
    body.darkmode .modal-body {
      color: #f8f9fa !important;
    }

    .qbtn.skipped {
      background-color: #ada7a0b9;
      color: white;
    }

    .btn {
      transition: all 0.25s ease;
    }

    .btn:hover {
      transform: translateY(-2px) scale(1.05);
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.25);
    }

    .btn:active {
      transform: scale(0.95);
    }

    .controls {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
}

.controls button {
  white-space: nowrap;
}

/* CURRENT QUESTION HIGHLIGHT (PURPLE) */
.qbtn.current {
  background: linear-gradient(135deg, #7b2cff, #b84cff);
  color: #ffffff;
  border: 2px solid #5b1fd6;
  box-shadow: 0 0 12px rgba(123, 44, 255, 0.7);
  transform: scale(1.12);
}


  </style>
</head>

<body>
  <!-- Animated Background -->
  <canvas id="bgCanvas"></canvas>

  <!-- ========== PORTAL MAIN PAGE ========== -->

<div id="question-image" class="mb-3 text-center"></div>

              <hr>
              <div class="d-grid">

                <button id="downloadPdfBtn" class="btn btn-outline-primary mb-2">

        </div>
      </div>

    <div class="modal fade" id="helpModal" tabindex="-1">

            <h5 class="modal-title">Help</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body" id="helpContent"></div>
        </div>

  <script>


    document.getElementById("downloadPdfBtn").addEventListener("click", generateResponsePDF);


    function renderHtmlToPdf(doc, html, x, y, maxWidth) {
      const temp = document.createElement("div");
      temp.innerHTML = html;

      let cursorY = y;
      let cursorX = x;
      const lineHeight = 5.5;

      function renderNode(node) {

        // LINE BREAK
        if (node.nodeName === "BR") {
          cursorY += lineHeight;
          cursorX = x;
          return;
        }

        // PARAGRAPH
        if (node.nodeName === "P") {
          cursorY += lineHeight;
          cursorX = x;
          node.childNodes.forEach(renderNode);
          cursorY += lineHeight;
          cursorX = x;
          return;
        }

        // TEXT NODE
        if (node.nodeType === Node.TEXT_NODE) {
          const text = node.textContent;
          doc.setFont("times", "normal");

          const words = text.split(" ");
          words.forEach(word => {
            const w = word + " ";
            const wWidth = doc.getTextWidth(w);

            if (cursorX + wWidth > x + maxWidth) {
              cursorY += lineHeight;
              cursorX = x;
            }

            doc.text(w, cursorX, cursorY);
            cursorX += wWidth;
          });
        }

        // BOLD / STRONG (INLINE)
        if (node.nodeName === "B" || node.nodeName === "STRONG") {
          doc.setFont("times", "bold");
          const words = node.textContent.split(" ");

          words.forEach(word => {
            const w = word + " ";
            const wWidth = doc.getTextWidth(w);

            if (cursorX + wWidth > x + maxWidth) {
              cursorY += lineHeight;
              cursorX = x;
            }

            doc.text(w, cursorX, cursorY);
            cursorX += wWidth;
          });

          doc.setFont("times", "normal");
        }
      }

      temp.childNodes.forEach(renderNode);

      return cursorY + lineHeight;
    }



    function ensureSpace(doc, y, neededHeight) {
      const PAGE_HEIGHT = doc.internal.pageSize.height;
      const BOTTOM_MARGIN = 18;

      if (y + neededHeight > PAGE_HEIGHT - BOTTOM_MARGIN) {
        doc.addPage();
        return 20; // new page top
      }
      return y;
    }

    function drawGoogleClickableQuestion(doc, qNo, qText, x, y, width) {
      const searchUrl =
        "https://www.google.com/search?q=" +
        encodeURIComponent(qText);

      // STYLE
      doc.setFont("times", "bold");
      doc.setFontSize(12.5);
      doc.setTextColor(200, 0, 0); // RED

      const lines = doc.splitTextToSize(`Q${qNo}. ${qText}`, width);

      lines.forEach(line => {
        doc.textWithLink(line, x, y, { url: searchUrl });
        y += 6.5;
      });

      // RESET COLOR
      doc.setTextColor(0);

      return y;
    }

    async function addImageToPDF(doc, imgSrc, x, y, maxWidth) {
      return new Promise((resolve) => {
        const img = new Image();
        img.crossOrigin = "anonymous";
        img.onload = function () {
          const ratio = img.height / img.width;
          const imgWidth = maxWidth;
          const imgHeight = imgWidth * ratio;

          // Page break check
          const pageHeight = doc.internal.pageSize.height;
          if (y + imgHeight > pageHeight - 20) {
            doc.addPage();
            y = 20;
          }

          doc.addImage(img, "JPEG", x, y, imgWidth, imgHeight);
          resolve(y + imgHeight + 6);
        };
        img.src = imgSrc;
      });
    }

    let particles = Array.from({ length: 50 }, () => ({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      r: Math.random() * 2,
      dx: (Math.random() - 0.5) * 0.5,
      dy: (Math.random() - 0.5) * 0.5
    }));

    function animateParticles() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      particles.forEach(p => {
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fillStyle = "rgba(0, 200, 255, 0.6)";
        ctx.fill();
        p.x += p.dx;
        p.y += p.dy;
        if (p.x < 0 || p.x > canvas.width) p.dx *= -1;
        if (p.y < 0 || p.y > canvas.height) p.dy *= -1;
      });
      requestAnimationFrame(animateParticles);
    }

      } else {
        btn.classList.remove("btn-success");
        btn.classList.add("btn-danger");
        btn.innerText = "🔇 Sound OFF";
      }
    });

    // Toggle question navigator visibility
    document.getElementById('toggleNavBtn').addEventListener('click', () => {
      const nav = document.getElementById('question-nav');
      nav.classList.toggle('hidden');
      const btn = document.getElementById('toggleNavBtn');
      if (nav.classList.contains('hidden')) {
        btn.innerHTML = '👁️ Show Question Navigator';
      } else {
        btn.innerHTML = '👁️ Hide Question Navigator';
      }
    });

    // INTERNAL STATE
    let totalQuestions = 0;
    let currentQuestion = 1;
    const answers = {}; // qNo => { selectedMetaId, review, answeredFeedback }
    let totalSeconds = 0;
    let timerInterval = null;
    let isDarkMode = false;
    let hintEnabled = true;
    let testSubmitted = false;
    let enterPressedForQuestion = {};
    let candidateName = "Anonymous";


    // helpers
    function shuffleArray(arr) {
      const a = arr.slice();
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function shuffleOptionsForQuestion(q) {
      const mapped = q.options.map((text, idx) => ({ id: idx, text }));
      const shuffled = shuffleArray(mapped);
      const origCorrectId = parseInt(q.correct, 10) - 1;
      const newCorrectIndex = shuffled.findIndex(o => o.id === origCorrectId);
      q._shuffled = {
        options: shuffled.map(o => o.text),
        meta: shuffled,
        correct: (newCorrectIndex + 1).toString()
      };
    }

    function prepareQuestions() {
      Object.keys(questions).forEach(k => {
        const q = questions[k];
        if (!q._shuffled) shuffleOptionsForQuestion(q);
      });
    }

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, c => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": "&#39;"
      })[c]);
    }

    // Build Google search query: question + all options
    function buildSearchQuery(index) {
      const q = questions[index];
      if (!q) return "";
      let combined = q.text + " ";
      if (Array.isArray(q.options)) {
        combined += q.options.join(" ");
      }
      return encodeURIComponent(combined);
    }

    // Question Nav
    function buildQuestionNav() {
      const nav = document.getElementById('question-nav');
      nav.innerHTML = '';
      for (let i = 1; i <= totalQuestions; i++) {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.id = 'q' + i;
        btn.className = 'qbtn default';
        btn.innerText = i;
        btn.addEventListener('click', () => loadQuestion(i));
        nav.append(btn);
        updateNav(i);
      }
    }

    function updateNav(num) {
      const btn = document.getElementById('q' + num);
      if (!btn) return;

      btn.className = 'qbtn';

      if (testSubmitted) {
        const q = questions[num];
        const ans = answers[num];
        const origCorrectId = parseInt(q.correct, 10) - 1;

        if (ans && (ans.selectedMetaId === 0 || (ans.selectedMetaId !== null && ans.selectedMetaId !== undefined))) {
          if (ans.selectedMetaId === origCorrectId) {
            btn.classList.add('answered'); // green
          } else {
            btn.classList.add('not-answered'); // red
          }
        } else {
          btn.classList.add('skipped'); // brown
        }
      } else {
        const ans = answers[num];
        if (ans && ans.review) {
          if (ans.selectedMetaId !== null && ans.selectedMetaId !== undefined) {
            btn.classList.add('review-answered');
          } else {
            btn.classList.add('review');
          }
        } else if (ans && (ans.selectedMetaId === 0 || ans.selectedMetaId)) {
          btn.classList.add('answered');
        } else {
          btn.classList.add('not-answered');
        }
      }

      if (num === currentQuestion) {
        btn.classList.add('current');
      }
    }

    function renderQuestion(num) {
      const q = questions[num];
      if (!q) return;
      if (!q._shuffled) shuffleOptionsForQuestion(q);
      const s = q._shuffled;

      const qImg = document.getElementById('question-image');
      qImg.innerHTML = '';
      if (q.image) {
        qImg.innerHTML = `<img src="${escapeHtml(q.image)}" class="img-fluid rounded" style="max-height:240px;">`;
      }

      document.getElementById('questionText').innerHTML =
        `<div><strong>Q${num}.</strong> ${escapeHtml(q.text)}</div>`;

      const optionsWrap = document.getElementById('options');
      optionsWrap.innerHTML = s.meta.map((m, idx) => {
        const pos = idx + 1;
        const selected = (answers[num] && answers[num].selectedMetaId === m.id) ? 'selected' : '';
        return `
        <label class="option-label ${selected}" data-pos="${pos}" data-original-id="${m.id}">
          <div class="badge-pos bg-light text-muted">${pos}</div>
          <div>${escapeHtml(m.text)}</div>
        </label>`;
      }).join('');

      if (testSubmitted) {
        const origCorrectId = parseInt(q.correct, 10) - 1;
        const curAns = answers[num];
        document.querySelectorAll('#options .option-label').forEach((lbl) => {
          const origId = parseInt(lbl.dataset.originalId, 10);
          if (origId === origCorrectId) {
            lbl.classList.add('correct');
            lbl.querySelector('.badge-pos').innerHTML = '✅';
          }
          if (curAns && (curAns.selectedMetaId === 0 || (curAns.selectedMetaId !== null && curAns.selectedMetaId !== undefined))) {
            if (curAns.selectedMetaId === origId && curAns.selectedMetaId !== origCorrectId) {
              lbl.classList.add('wrong');
              lbl.querySelector('.badge-pos').innerHTML = '❌';
            }
          }
        });
      }

      document.querySelectorAll('#options .option-label').forEach(lbl => {
        lbl.addEventListener('click', () => {
          if (testSubmitted) return;
          if (answers[currentQuestion] && answers[currentQuestion].answeredFeedback) return;

          const origId = parseInt(lbl.dataset.originalId, 10);
          const prev = answers[currentQuestion] || { selectedMetaId: null, review: false };

          answers[currentQuestion] = {
            selectedMetaId: origId,
            review: !!prev.review,
            answeredFeedback: true
          };

          document.querySelectorAll('#options .option-label').forEach(l => l.classList.remove('selected'));
          lbl.classList.add('selected');

          const qNow = questions[currentQuestion];
          const origCorrectId = parseInt(qNow.correct, 10) - 1;
          const correctLbl = Array.from(document.querySelectorAll('#options .option-label'))
            .find(l => parseInt(l.dataset.originalId, 10) === origCorrectId);

          const isCorrect = (origId === origCorrectId);
          showInstantFeedback(isCorrect, lbl, correctLbl);
          updateNav(currentQuestion);
        });
      });

      document.querySelectorAll('.qbtn').forEach(b => b.classList.remove('current'));
      const curBtn = document.getElementById('q' + num);
      if (curBtn) curBtn.classList.add('current');
    }

    function loadQuestion(num) {
      // 👀 MARK AS VISITED WHEN QUESTION COMES ON SCREEN
      if (!answers[num]) {
        answers[num] = {
          selectedMetaId: null,
          review: false,
          answeredFeedback: false,
          visited: true
        };
      } else {
        answers[num].visited = true;
      }
      currentQuestion = num;
      renderQuestion(num);
      document.getElementById('review-container').style.display = 'none';
      for (let i = 1; i <= totalQuestions; i++) updateNav(i);
      enterPressedForQuestion[num] = false;
    }

    function mark(forReview) {
      if (testSubmitted) {
        if (currentQuestion < totalQuestions) {
          loadQuestion(currentQuestion + 1);
        }
        return;
      }

      const curAns = answers[currentQuestion];
      if (!curAns) {
        answers[currentQuestion] = { selectedMetaId: null, review: !!forReview };
      } else {
        answers[currentQuestion].review = !!forReview;
      }
      updateNav(currentQuestion);
      if (currentQuestion < totalQuestions) loadQuestion(currentQuestion + 1);
    }

    function clearResponse() {
      delete answers[currentQuestion];
      renderQuestion(currentQuestion);
      updateNav(currentQuestion);
    }



    function startTimerDisplay() {
      const prog = document.getElementById('timeProgress');
      if (timerInterval) clearInterval(timerInterval);
      timerInterval = setInterval(() => {
        if (totalSeconds > 0) {
          totalSeconds--;
          const m = String(Math.floor(totalSeconds / 60)).padStart(2, '0');
          const s = String(totalSeconds % 60).padStart(2, '0');
          document.getElementById('timer').innerText = `${m}:${s}`;
          const initial = parseInt(document.body.dataset.initialSeconds || '0', 10);
          const perc = initial ? ((initial - totalSeconds) / initial) * 100 : 0;
          prog.style.width = `${perc}%`;
        } else {
          document.getElementById('timer').innerText = "Time's up!";
          clearInterval(timerInterval);
          autoSubmit();
        }
      }, 1000);
    }

    function autoSubmit() {
      submitTest(true);
    }

    function submitTest(isAuto = false) {
      testSubmitted = true;

      const saveNextButton = document.getElementById('saveNextBtn');
      saveNextButton.textContent = 'Next ⟶';

      document.getElementById('reviewNextBtn').style.display = 'none';
      document.getElementById('clearBtn').style.display = 'none';
      document.getElementById('submitBtn').style.display = 'none';
      document.getElementById('reviewSummaryBtn').style.display = 'inline-block';

      let attempted = 0, correct = 0, wrong = 0;
      for (let i = 1; i <= totalQuestions; i++) {
        const a = answers[i];
        if (a && (a.selectedMetaId === 0 || a.selectedMetaId)) {
          attempted++;
          const origCorrectId = parseInt(questions[i].correct, 10) - 1;
          if (a.selectedMetaId === origCorrectId) correct++;
          else wrong++;
        }
      }
      const skipped = totalQuestions - attempted;
      const score = (correct * 2) - (wrong * 0.5);

      // ===== SEND DATA TO GOOGLE SHEET =====
      const now = new Date();

      const testData = {
        date: now.toLocaleDateString(),
        time: now.toLocaleTimeString(),
        candidateName: candidateName,   // 👈 ADD THIS LINE
        testName: document.getElementById("testTitle").innerText,
        totalQuestions: totalQuestions,
        attempted: attempted,
        correct: correct,
        wrong: wrong,
        skipped: skipped,
        score: score,
        timeTakenMinutes: Math.round(
          (parseInt(document.body.dataset.initialSeconds || 0) - totalSeconds) / 60
        ),
        autoSubmitted: isAuto ? "YES" : "NO"
      };



      sendTestDataToSheet(testData);
      // ====================================


      let scHtml = `<div class="row"><div class="col-md-6">
  <h4>Result</h4>
  <p>Attempted: <strong>${attempted}</strong></p>
  <p>Correct: <strong>${correct}</strong></p>
  <p>Wrong: <strong>${wrong}</strong></p>
  <p>Skipped: <strong>${skipped}</strong></p>
  <p>Score: <strong>${score}</strong></p>
</div><div class="col-md-6">
  <h5>Summary</h5>
  <div class="progress" style="height:16px"><div class="progress-bar" role="progressbar" style="width:${Math.round((correct / totalQuestions) * 100)}%">${Math.round((correct / totalQuestions) * 100)}%</div></div>
</div></div>
<hr>
<h5>Question Review</h5>`;

      for (let i = 1; i <= totalQuestions; i++) {
        const q = questions[i];
        const a = answers[i];
        const origCorrectId = parseInt(q.correct, 10) - 1;
        const userAnsText =
          (a && (a.selectedMetaId === 0 || a.selectedMetaId)) ?
            q._shuffled.meta.find(m => m.id === a.selectedMetaId).text : 'Not Attempted';
        const correctAnsText = q._shuffled.meta.find(m => m.id === origCorrectId).text;
        const bg =
          (a && (a.selectedMetaId === 0 || a.selectedMetaId)) ?
            (a.selectedMetaId === origCorrectId ? 'bg-success text-white' : 'bg-danger text-white') :
            'bg-secondary text-white';

        scHtml += `<div class="card mb-2 ${bg}"><div class="card-body">
    <p><strong>Q${i}.</strong> ${escapeHtml(q.text)}</p>
    <p><strong>Your Answer:</strong> ${escapeHtml(userAnsText)}</p>
    <p><strong>Correct Answer ✅:</strong> ${escapeHtml(correctAnsText)}</p>
  ${explanations[i] ? `<button class="btn btn-sm btn-light mt-2" onclick="showExplanation(${i})">View Explanation</button>` : ''}
  <div class="mt-2">
    <a href="https://www.google.com/search?q=${buildSearchQuery(i)}"
       target="_blank"
       class="btn btn-sm btn-primary">
       🔍 Search it on Google
    </a>
  </div>
      </div></div>`;
      }

      document.getElementById('scoreContent').innerHTML = scHtml;
      new bootstrap.Modal(document.getElementById('scoreModal')).show();

      for (let i = 1; i <= totalQuestions; i++) {
        updateNav(i);
      }

      renderQuestion(currentQuestion);
    }

    function showExplanation(num) {
      const q = questions[num];
      const e = explanations[num];
      if (!q) return;

      let html = `
    <p><strong>Q${num}.</strong> ${q.text}</p>
    <p><strong>Options:</strong></p>
    <ul>
      ${q.options.map((opt, idx) => `<li>${idx + 1}. ${opt}</li>`).join('')}
    </ul>
    <p><strong>Correct Answer:</strong> ${q.options[parseInt(q.correct) - 1]}</p>
    <hr>
    <p><strong>Explanation:</strong> ${e.text}</p>
  `;

      if (e.image) {
        html += `
      <div class="text-center mt-3">
        <img src="${e.image}" alt="Explanation Image" class="img-fluid rounded shadow">
      </div>
    `;
      }

      document.getElementById('explanationContent').innerHTML = html;
      new bootstrap.Modal(document.getElementById('explanationModal')).show();
    }

    function showInstantFeedback(isCorrect, selectedLbl, correctLbl) {
      if (!hintEnabled) {
        document.getElementById('options').classList.remove('disabled');
        return;
      }

      const optionsWrap = document.getElementById('options');
      optionsWrap.classList.add('disabled');

      playFeedbackSound(isCorrect);

      if (isCorrect) {
        selectedLbl.classList.add('correct');
        selectedLbl.querySelector('.badge-pos').innerHTML = '✅';
        document.body.classList.add('blink-green');
      } else {
        selectedLbl.classList.add('wrong');
        selectedLbl.querySelector('.badge-pos').innerHTML = '❌';
        document.body.classList.add('blink-red');
        if (correctLbl) {
          correctLbl.classList.add('correct');
          correctLbl.querySelector('.badge-pos').innerHTML = '✅';
        }
      }

      setTimeout(() => {
        document.body.classList.remove('blink-green', 'blink-red');
        optionsWrap.classList.remove('disabled');
      }, 900);
    }

    function showHelpForCurrentQuestion() {
      const q = questions[currentQuestion];
      const e = explanations[currentQuestion];
      if (!q) return;

      const searchUrl = `https://www.google.com/search?q=${buildSearchQuery(currentQuestion)}`;

      let helpHTML = `
  <p><strong>Q${currentQuestion}.</strong> ${q.text}</p>
  <hr>

  <p style="color:#0d6efd; font-weight:600;">
    <strong>Correct Answer :</strong>
    ${q.options[parseInt(q.correct, 10) - 1]}
  </p>

  <hr>
`;

      if (e && e.text) {
        helpHTML += `<p>${e.text}</p>`;
      } else {
        helpHTML += `<p>No explanation available.</p>`;
      }


      if (e && e.image) {
        helpHTML += `
      <div class="text-center my-3">
        <img src="${e.image}" alt="Explanation Image" class="img-fluid rounded shadow-sm"
             style="max-height:250px; object-fit:contain; border:2px solid #ddd; border-radius:10px;">
      </div>
    `;
      }

      helpHTML += `
    <div class="text-center mt-4">
      <a href="${searchUrl}" target="_blank"
         class="btn btn-primary shadow-sm"
         style="border-radius:12px; padding:10px 20px; font-weight:600;">
         🔍 Search it on Google
      </a>
    </div>
  `;

      document.getElementById('helpContent').innerHTML = helpHTML;
    }

    document.getElementById('helpBtn').addEventListener('click', () => {
      showHelpForCurrentQuestion();
      bootstrap.Modal.getOrCreateInstance(document.getElementById('helpModal')).show();
    });

    // Keyboard "0" toggles help modal
    // Keyboard "0" toggles help modal (disabled while typing in input fields)
    document.addEventListener('keydown', function (event) {

      // 🔒 Block help shortcut when user is typing in input or textarea
      const active = document.activeElement;
      if (active && (active.tagName === "INPUT" || active.tagName === "TEXTAREA")) {
        return;
      }

      if (event.key === "0" && !testPage.classList.contains('hidden')) {
        const helpEl = document.getElementById("helpModal");
        const modalInst = bootstrap.Modal.getInstance(helpEl);

        if (helpEl.classList.contains("show") && modalInst) {
          modalInst.hide();
        } else {
          showHelpForCurrentQuestion();
          bootstrap.Modal.getOrCreateInstance(helpEl).show();
        }
        event.preventDefault();
      }
    });






    // Dark mode
    document.getElementById('modeSwitcher').addEventListener('click', () => {
      isDarkMode = !isDarkMode;
      document.body.classList.toggle('darkmode', isDarkMode);
      const btn = document.getElementById('modeSwitcher');
      if (isDarkMode) {
        btn.innerHTML = '☀️ Light Mode';
      } else {
        btn.innerHTML = '🌙 Dark Mode';
      }
    });

    // Hint / practice mode
    document.getElementById('hintToggle').addEventListener('click', () => {
      hintEnabled = !hintEnabled;
      const btn = document.getElementById('hintToggle');
      if (hintEnabled) {
        btn.innerText = 'Exam Mode';
        document.getElementById('helpBtn').style.display = '';
      } else {
        btn.innerText = 'Practice Mode';
        document.getElementById('helpBtn').style.display = 'none';
      }
    });

    document.getElementById('reviewSummaryBtn').addEventListener('click', () => {
      new bootstrap.Modal(document.getElementById('scoreModal')).show();
    });

    // Keyboard shortcuts
    document.addEventListener("keydown", function (e) {

      // ⛔ Do NOT trigger shortcuts when typing in popup input boxes
      const active = document.activeElement;
      if (active && (active.tagName === "INPUT" || active.tagName === "TEXTAREA")) {
        return; // allow typing normally
      }

      if (testPage.classList.contains('hidden')) return;


      if (["1", "2", "3", "4"].includes(e.key) && !testSubmitted) {
        const idx = parseInt(e.key, 10) - 1;
        const optionLabels = document.querySelectorAll("#options .option-label");
        if (optionLabels[idx]) {
          optionLabels[idx].click();
          enterPressedForQuestion[currentQuestion] = false;
          e.preventDefault();
          return;
        }
      }
      if (e.key === "Enter") {
        if (!enterPressedForQuestion[currentQuestion]) {
          mark(false);
          enterPressedForQuestion[currentQuestion] = true;
        }
        e.preventDefault();
        return;
      }
      if (e.key === "ArrowLeft") {
        if (currentQuestion > 1) loadQuestion(currentQuestion - 1);
        e.preventDefault();
        return;
      }
      if (e.key === "ArrowRight") {
        if (currentQuestion < totalQuestions) {
          mark(false);
          enterPressedForQuestion[currentQuestion + 1] = false;
        }
        e.preventDefault();
        return;
      }
    });



    function sendTestDataToSheet(data) {
      const url = "https://script.google.com/macros/s/AKfycby4H6Jr-ff1zPIXyAh8O4g0UIcBgeFmEnpn1DPXGft7tyPTKXttGhijpQYkLQm7Cq7MZw/exec";

      const formData = new FormData();
      for (const key in data) {
        formData.append(key, data[key]);
      }

      fetch(url, {
        method: "POST",
        body: formData,
        mode: "no-cors"   // 🔥 THIS LINE IS CRITICAL
      }).catch(() => {
        // silently ignore — browser blocks response but request is sent
      });
    }



    document.addEventListener('hidden.bs.modal', () => {
      document.activeElement?.blur();
    });


    // INIT MOCK ENGINE (called after scripts for a chapter are loaded)
    function initMockEngine() {
      if (!window.questions || Object.keys(questions).length === 0) {
        alert("No questions loaded.");
        return;
      }
      if (!window.explanations) window.explanations = {};

      // reset state
      totalQuestions = Object.keys(questions).length;
      currentQuestion = 1;
      // First question is always visited
      answers[1] = {
        selectedMetaId: null,
        review: false,
        answeredFeedback: false,
        visited: true
      };

      for (const k in answers) delete answers[k];
      testSubmitted = false;
      hintEnabled = true;
      soundEnabled = true;
      enterPressedForQuestion = {};
      totalSeconds = 0;
      if (timerInterval) clearInterval(timerInterval);
      document.getElementById('timeProgress').style.width = '0%';

      prepareQuestions();
      buildQuestionNav();
      loadQuestion(1);
      openStartTestDialog();






      // Buttons
      document.getElementById('saveNextBtn').onclick = () => { mark(false); };
      document.getElementById('reviewNextBtn').onclick = () => { mark(true); };
      document.getElementById('prevBtn').onclick = () => { if (currentQuestion > 1) loadQuestion(currentQuestion - 1); };
      document.getElementById('clearBtn').onclick = clearResponse;

      document.getElementById('submitBtn').onclick = () => {
        showPopup(
          "Submit Test?",
          "Are you sure you want to submit the test? You cannot change answers after submitting.",
          [
            { text: "Cancel", class: "btn-secondary" },
            { text: "Submit", class: "btn-danger", onClick: () => submitTest(false) }
          ]
        );
      };

    }


    function openStartTestDialog() {
      const modalEl = document.getElementById("startTestModal");
      const modal = new bootstrap.Modal(modalEl, {
        backdrop: "static",
        keyboard: false
      });

      modal.show();

      document.getElementById("startTestBtn").onclick = () => {
        const nameVal =
          document.getElementById("candidateNameInput").value.trim();
        const timeVal =
          parseInt(document.getElementById("testTimeInput").value, 10);

        candidateName = nameVal || "Anonymous";

        totalSeconds = (timeVal && timeVal > 0 ? timeVal : 10) * 60;
        document.body.dataset.initialSeconds = totalSeconds;

        modal.hide();
        startTimerDisplay();
      };
    }

    // ===============================
    // LIGHT SWIPE LEFT/RIGHT ON QUESTION BOX
    // ===============================
    let touchStartX = 0;
    let touchEndX = 0;
    const swipeZone = document.getElementById("question-box");

    function goToNextQuestion() {
      if (currentQuestion < totalQuestions) {
        // same behavior as ArrowRight (save & next)
        mark(false);
        enterPressedForQuestion[currentQuestion + 1] = false;
      }
    }

    function goToPreviousQuestion() {
      if (currentQuestion > 1) {
        loadQuestion(currentQuestion - 1);
      }
    }

    function handleGesture() {
      const diff = touchEndX - touchStartX;
      const threshold = 50; // minimum distance for swipe

      if (Math.abs(diff) < threshold) return;

      // small nudge animation, no heavy effect
      if (diff < 0) {
        // swipe LEFT → next
        swipeZone.style.transform = "translateX(-20px)";
        setTimeout(() => {
          swipeZone.style.transform = "translateX(0)";
          goToNextQuestion();
        }, 120);
      } else {
        // swipe RIGHT → previous
        swipeZone.style.transform = "translateX(20px)";
        setTimeout(() => {
          swipeZone.style.transform = "translateX(0)";
          goToPreviousQuestion();
        }, 120);
      }
    }

    swipeZone.addEventListener("touchstart", (e) => {
      touchStartX = e.changedTouches[0].screenX;
    });

    swipeZone.addEventListener("touchend", (e) => {
      touchEndX = e.changedTouches[0].screenX;
      handleGesture();
    });

    // initial: only portal visible, test engine is idle until chapter selected

    function showPopup(title, message, buttons = []) {
      document.getElementById("customPopupTitle").innerText = title;
      document.getElementById("customPopupBody").innerHTML = message;

      const footer = document.getElementById("customPopupFooter");
      footer.innerHTML = "";

      buttons.forEach(btn => {
        const b = document.createElement("button");
        b.className = "btn " + (btn.class || "btn-primary");
        b.innerText = btn.text;
        b.onclick = () => {
          if (btn.onClick) btn.onClick();
          modal.hide();
        };
        footer.appendChild(b);
      });

      const modalEl = document.getElementById("customPopup");
      var modal = new bootstrap.Modal(modalEl);
      modal.show();
    }

  </script>

  <!-- Custom Popup Modal -->
  <div class="modal fade" id="customPopup" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content"
        style="border-radius:18px; backdrop-filter:blur(10px); background:rgba(255,255,255,0.15);">
        <div class="modal-header">
          <h5 class="modal-title" id="customPopupTitle">Alert</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body" id="customPopupBody" style="font-size:1.1rem;"></div>
        <div class="modal-footer" id="customPopupFooter"></div>

    </div>
  </div>

  <!-- Start Test Dialog -->
  <div class="modal fade" id="startTestModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered mx-3 mx-sm-auto">

      <div class="modal-content card-app">

        <div class="modal-header border-0">
          <h5 class="modal-title">Start Test</h5>
        </div>

        <div class="modal-body">
          <div class="mb-3">
            <label class="form-label">Enter Your Name (optional)</label>
            <input type="text" id="candidateNameInput" class="form-control" placeholder="e.g. Sudhanshu">

          <div class="mb-2">
            <label class="form-label">Test Time (in minutes)</label>
            <input type="number" id="testTimeInput" class="form-control" placeholder="10" min="1">
          </div>
        </div>

        <div class="modal-footer border-0">
          <button class="btn btn-primary w-100" id="startTestBtn">
            🚀 Start Test
          </button>
        </div>

      </div>
    </div>

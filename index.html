  <style>
    :root {
      --grad1: #00c6ff;
      --grad2: #0072ff;
      --grad3: #6dd3ff;
      --grad4: #7b61ff;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(120deg, #0a0f24, #1a2740);
      color: #f0f8ff;
      margin: 0;
      padding: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
    }

    .card-main {
      width: 95%;
      max-width: 950px;
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 30px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
      text-align: center;
      animation: fadeIn 0.6s ease;
    }

    h1 {
      font-weight: 700;
      margin-bottom: 25px;
      color: #e4f3ff;
      text-shadow: 0 0 8px rgba(0, 194, 255, 0.4);
    }

    h2 {
      color: #d8ebff;
      margin-bottom: 20px;
      font-weight: 600;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 15px;
    }

    .btn-glass {
      border: none;
      border-radius: 12px;
      padding: 16px;
      color: #fff;
      font-weight: 600;
      letter-spacing: 0.3px;
      background: linear-gradient(135deg, var(--grad1), var(--grad2));
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
      transition: all 0.3s;
      cursor: pointer;
      position: relative;
      overflow: hidden;
    }

    .btn-glass:hover {
      transform: translateY(-6px) scale(1.05);
      box-shadow: 0 0 25px rgba(0, 194, 255, 0.7);
    }

    .btn-glass::after {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(255, 255, 255, 0.15) 0%, transparent 60%);
      transform: translateX(-50%) translateY(-50%);
      transition: opacity 0.4s;
      opacity: 0;
    }

    .btn-glass:hover::after {
      opacity: 1;
    }

    .back-btn {
      border: none;
      background: linear-gradient(135deg, #ff6b6b, #d41b1b);
      border-radius: 10px;
      color: #fff;
      font-weight: 600;
      padding: 10px 18px;
      margin-bottom: 20px;
      transition: all 0.3s;
    }

    .back-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 18px rgba(255, 0, 0, 0.4);
    }

    .hidden {
      display: none;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(15px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeOut {
      from {
        opacity: 1;
        transform: translateY(0);
      }

      to {
        opacity: 0;
        transform: translateY(15px);
      }
    }

    /* Background Canvas */
    #bgCanvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
    }

    /* Responsive */
    @media (max-width: 600px) {
      .card-main {
        padding: 20px;
      }

      h1,
      h2 {
        font-size: 1.4rem;
      }

      .btn-glass {
        padding: 12px;
        font-size: 0.9rem;
      }
    }
  </style>
</head>

    const mainPage = document.getElementById('mainPage');
    const subPage = document.getElementById('subPage');
    const topicName = document.getElementById('topicName');
    const subButtons = document.getElementById('subButtons');

    // Open subpage with fade animation
    function openSubPage(index) {
      mainPage.style.animation = "fadeOut 0.5s forwards";
      setTimeout(() => {
        mainPage.classList.add('hidden');
        subPage.classList.remove('hidden');
        subPage.style.animation = "fadeIn 0.5s forwards";
      }, 400);

      topicName.textContent = topics[index];
      subButtons.innerHTML = '';

      links[index].forEach(item => {
        const btn = document.createElement('button');
        btn.className = 'btn-glass';
        btn.textContent = item.name;
        btn.onclick = () => window.open(item.url, "_blank");
        subButtons.appendChild(btn);
      });
    }

    // Back to main page
    function goBack() {
      subPage.style.animation = "fadeOut 0.5s forwards";
      setTimeout(() => {
        subPage.classList.add('hidden');
        mainPage.classList.remove('hidden');
        mainPage.style.animation = "fadeIn 0.5s forwards";
      }, 400);
    }

    // Simple floating particles animation
    const canvas = document.getElementById("bgCanvas");
    const ctx = canvas.getContext("2d");
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    let particles = Array.from({ length: 50 }, () => ({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      r: Math.random() * 2,
      dx: (Math.random() - 0.5) * 0.5,
      dy: (Math.random() - 0.5) * 0.5
    }));

    function animateParticles() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      particles.forEach(p => {
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fillStyle = "rgba(0, 200, 255, 0.6)";
        ctx.fill();
        p.x += p.dx;
        p.y += p.dy;
        if (p.x < 0 || p.x > canvas.width) p.dx *= -1;
        if (p.y < 0 || p.y > canvas.height) p.dy *= -1;
      });
      requestAnimationFrame(animateParticles);
    }
    animateParticles();



  </script>
